<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpeakUp — AI English Speaking Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d1a;
    color: #f0ece0;
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .screen.active { display: flex; }

  /* ── Typography ── */
  .playfair { font-family: 'Playfair Display', serif; }

  /* ── Gradient text ── */
  .grad-text {
    background: linear-gradient(135deg, #f7c948, #ff9a3c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── HOME ── */
  .hero { text-align: center; margin-bottom: 48px; }
  .hero-icon { font-size: 48px; margin-bottom: 12px; }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: -1px;
  }
  .hero p { color: #9994b8; font-size: 16px; margin-top: 8px; }

  .section-label {
    font-size: 13px;
    color: #6b6882;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  /* Level buttons */
  .level-group { display: flex; gap: 10px; margin-bottom: 36px; }
  .level-btn {
    padding: 8px 20px;
    border-radius: 999px;
    border: 1.5px solid #2a2a40;
    background: transparent;
    color: #9994b8;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .level-btn.active,
  .level-btn:hover {
    background: #f7c948;
    border-color: #f7c948;
    color: #0d0d1a;
    font-weight: 700;
  }

  /* Topic grid */
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 680px;
    margin-bottom: 36px;
  }
  .topic-card {
    background: #12122a;
    border: 1.5px solid #1e1e38;
    border-radius: 16px;
    padding: 18px 14px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
  }
  .topic-card:hover { transform: translateY(-4px) scale(1.02); border-color: #f7c948; }
  .topic-card.selected {
    background: linear-gradient(135deg, #1e1a35, #2a1f3d);
    border-color: #f7c948;
  }
  .topic-card .emoji { font-size: 28px; margin-bottom: 8px; }
  .topic-card .label { font-size: 13px; font-weight: 600; color: #f0ece0; }

  /* Prompt preview */
  .prompt-preview {
    background: #12122a;
    border: 1px solid #2a2a40;
    border-radius: 16px;
    padding: 20px 24px;
    max-width: 500px;
    width: 100%;
    margin-bottom: 28px;
    text-align: center;
    display: none;
  }
  .prompt-preview p { color: #c8c4e0; font-size: 15px; line-height: 1.6; }

  /* Start button */
  .start-btn {
    background: #1e1e38;
    color: #444;
    border: none;
    border-radius: 999px;
    padding: 16px 48px;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    cursor: not-allowed;
    transition: all 0.3s;
  }
  .start-btn.ready {
    background: linear-gradient(135deg, #f7c948, #ff6b35);
    color: #0d0d1a;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(247,201,72,0.25);
  }
  .start-btn.ready:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 40px rgba(247,201,72,0.4);
  }

  /* ── PRACTICE ── */
  .back-btn {
    align-self: flex-start;
    background: none;
    border: none;
    color: #6b6882;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 24px;
    font-family: 'Source Sans 3', sans-serif;
  }
  .back-btn:hover { color: #f0ece0; }

  .topic-banner {
    background: #12122a;
    border: 1px solid #2a2a40;
    border-radius: 20px;
    padding: 24px;
    max-width: 560px;
    width: 100%;
    margin-bottom: 32px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .topic-banner .big-emoji { font-size: 32px; flex-shrink: 0; }
  .topic-banner .topic-label { font-size: 12px; color: #6b6882; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .topic-banner p { color: #c8c4e0; line-height: 1.6; font-size: 15px; }

  /* Mic area */
  .mic-area {
    position: relative;
    margin-bottom: 32px;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 120px;
    height: 120px;
  }
  .ripple {
    position: absolute;
    width: 110px; height: 110px;
    border-radius: 50%;
    opacity: 0;
    display: none;
  }
  .ripple-1 { background: rgba(255,107,53,0.2); }
  .ripple-2 { background: rgba(247,201,72,0.15); }
  .recording .ripple { display: block; }
  .recording .ripple-1 { animation: ripple 1.4s infinite; }
  .recording .ripple-2 { animation: ripple 1.4s 0.4s infinite; }

  @keyframes ripple {
    0%   { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.12); opacity: 0.8; }
  }

  .mic-btn {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f7c948, #ff9a3c);
    border: none;
    cursor: pointer;
    position: relative;
    z-index: 1;
    font-size: 32px;
    box-shadow: 0 8px 30px rgba(247,201,72,0.3);
    transition: all 0.3s;
  }
  .mic-btn.recording {
    background: linear-gradient(135deg, #ff4444, #ff6b35);
    box-shadow: 0 0 30px rgba(255,68,68,0.5);
    animation: pulse 1.5s infinite;
  }

  .rec-status {
    color: #6b6882;
    font-size: 14px;
    margin-bottom: 24px;
    font-weight: 600;
  }
  .rec-status.active { color: #ff9a3c; }

  .transcript-box {
    background: #12122a;
    border: 1px solid #2a2a40;
    border-radius: 20px;
    padding: 20px;
    max-width: 560px;
    width: 100%;
    min-height: 160px;
    margin-bottom: 28px;
  }
  .transcript-box .box-label { font-size: 12px; color: #6b6882; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
  #transcript-text { color: #e0dced; line-height: 1.7; font-size: 15px; }
  #interim-text { color: #6b6882; font-style: italic; }
  #transcript-placeholder { color: #3a3a55; }

  .feedback-btn {
    background: linear-gradient(135deg, #f7c948, #ff6b35);
    color: #0d0d1a;
    border: none;
    border-radius: 999px;
    padding: 15px 44px;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(247,201,72,0.3);
    display: none;
    transition: transform 0.2s;
  }
  .feedback-btn:hover { transform: scale(1.04); }

  /* ── FEEDBACK ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #feedback-screen { padding: 32px 20px; }

  .feedback-content {
    max-width: 560px;
    width: 100%;
    animation: fadeUp 0.5s ease;
  }

  .loading-box { text-align: center; padding-top: 80px; }
  .loading-box .loading-icon { font-size: 48px; margin-bottom: 20px; }
  .loading-box p { color: #9994b8; font-size: 16px; }

  /* Score hero card */
  .score-hero {
    background: linear-gradient(135deg, #1a1435, #2a1f3d);
    border: 1px solid #3a2a50;
    border-radius: 24px;
    padding: 28px;
    text-align: center;
    margin-bottom: 20px;
  }
  .score-number {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 900;
  }
  .score-number span { font-size: 28px; }
  .score-hero p { color: #c8c4e0; margin-top: 10px; line-height: 1.6; font-size: 15px; }

  /* Category card */
  .cat-card {
    background: #12122a;
    border: 1px solid #1e1e38;
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .cat-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .cat-header .cat-name { font-size: 14px; font-weight: 600; }
  .cat-header .cat-score { font-weight: 700; font-size: 14px; }
  .score-bar-bg { background: #1a1a2e; border-radius: 999px; height: 8px; overflow: hidden; margin-bottom: 10px; }
  .score-bar-fill { height: 100%; border-radius: 999px; transition: width 1s ease; }
  .cat-comment { color: #b0accc; font-size: 13px; line-height: 1.6; }

  /* Sub-label */
  .sub-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin: 14px 0 8px; }

  /* Expression / correction chip */
  .chip {
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 12px;
  }
  .chip-vocab { background: #1a1a35; border-left: 3px solid #7b5ea7; }
  .chip-grammar { background: #1a1a35; border-left: 3px solid #f7c948; }
  .chip-row { margin-bottom: 4px; }
  .chip-wrong { color: #ff8080; text-decoration: line-through; }
  .chip-arrow { color: #6b6882; margin: 0 8px; }
  .chip-right { color: #a8e6cf; font-weight: 600; }
  .chip-reason { color: #8884aa; line-height: 1.5; }

  /* Better version */
  .better-version {
    background: linear-gradient(135deg, #0f1a2e, #0f2a1a);
    border: 1px solid #2a4a3a;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .better-version p { color: #c8f0d8; font-size: 14px; line-height: 1.8; }

  /* Tip */
  .tip-box {
    background: linear-gradient(135deg, #1a1410, #2a2010);
    border: 1px solid #4a3a20;
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .tip-box p { color: #f0e0c0; font-size: 14px; line-height: 1.6; }

  /* Practice again */
  .again-btn {
    width: 100%;
    background: linear-gradient(135deg, #f7c948, #ff6b35);
    color: #0d0d1a;
    border: none;
    border-radius: 999px;
    padding: 16px;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .again-btn:hover { transform: scale(1.02); }

  .error-msg { color: #ff6b6b; font-size: 15px; }
</style>
</head>
<body>

<!-- ══════════════════ HOME SCREEN ══════════════════ -->
<div id="home-screen" class="screen active">
  <div class="hero">
    <div class="hero-icon">🎙️</div>
    <h1 class="playfair grad-text">SpeakUp</h1>
    <p>AI-powered English speaking practice</p>
  </div>

  <p class="section-label">Your Level</p>
  <div class="level-group" id="level-group">
    <button class="level-btn" data-level="Beginner">Beginner</button>
    <button class="level-btn active" data-level="Intermediate">Intermediate</button>
    <button class="level-btn" data-level="Advanced">Advanced</button>
  </div>

  <p class="section-label">Choose a Topic</p>
  <div class="topic-grid" id="topic-grid"></div>

  <div class="prompt-preview" id="prompt-preview">
    <p id="prompt-text"></p>
  </div>

  <button class="start-btn" id="start-btn">Select a topic first</button>
</div>

<!-- ══════════════════ PRACTICE SCREEN ══════════════════ -->
<div id="practice-screen" class="screen">
  <button class="back-btn" id="practice-back">← Back</button>

  <div class="topic-banner">
    <div class="big-emoji" id="banner-emoji"></div>
    <div>
      <div class="topic-label">Topic</div>
      <p id="banner-prompt"></p>
    </div>
  </div>

  <div class="mic-area" id="mic-area">
    <div class="ripple ripple-1"></div>
    <div class="ripple ripple-2"></div>
    <button class="mic-btn" id="mic-btn">🎙</button>
  </div>

  <div class="rec-status" id="rec-status">Tap to start recording</div>

  <div class="transcript-box">
    <div class="box-label">Your Speech</div>
    <div id="transcript-text">
      <span id="final-text"></span>
      <span id="interim-text"></span>
      <span id="transcript-placeholder">Start speaking and your words will appear here...</span>
    </div>
  </div>

  <button class="feedback-btn" id="feedback-btn">Get AI Feedback ✨</button>
</div>

<!-- ══════════════════ FEEDBACK SCREEN ══════════════════ -->
<div id="feedback-screen" class="screen">
  <button class="back-btn" id="feedback-back">← Try Again</button>
  <div id="feedback-body"></div>
</div>

<script>
// ── Data ──────────────────────────────────────────────
const TOPICS = [
  { id:1, emoji:"🌅", title:"Daily Routine",   prompt:"Describe your typical morning routine. What do you do when you wake up?" },
  { id:2, emoji:"🍜", title:"Favorite Food",   prompt:"Talk about your favorite food or dish. Why do you love it so much?" },
  { id:3, emoji:"✈️", title:"Dream Travel",    prompt:"Describe a place you would love to visit someday. What would you do there?" },
  { id:4, emoji:"🎬", title:"A Movie/Show",    prompt:"Tell me about a movie or TV show you recently watched. What was it about?" },
  { id:5, emoji:"💼", title:"Work or Study",   prompt:"Describe what you do for work or study. What do you enjoy most about it?" },
  { id:6, emoji:"🌟", title:"A Life Goal",     prompt:"Share one important goal you have in life. How do you plan to achieve it?" },
  { id:7, emoji:"🎵", title:"Music You Love",  prompt:"Talk about music you enjoy. What kind of music moves you and why?" },
  { id:8, emoji:"🐾", title:"Pets or Animals", prompt:"Do you have a pet? Or what animal would you love to have? Tell me about it." },
];

// ── State ─────────────────────────────────────────────
let selectedTopic  = null;
let selectedLevel  = "Intermediate";
let isRecording    = false;
let finalTranscript = "";
let recordingTime  = 0;
let timerInterval  = null;
let recognition    = null;
let interimSnapshot = "";

// ── Helpers ───────────────────────────────────────────
const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,"0");
const fmt = s => `${pad(Math.floor(s/60))}:${pad(s%60)}`;

function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(`${name}-screen`).classList.add("active");
}

// ── Build Topic Grid ──────────────────────────────────
const grid = $("topic-grid");
TOPICS.forEach(t => {
  const card = document.createElement("div");
  card.className = "topic-card";
  card.dataset.id = t.id;
  card.innerHTML = `<div class="emoji">${t.emoji}</div><div class="label">${t.title}</div>`;
  card.addEventListener("click", () => selectTopic(t));
  grid.appendChild(card);
});

function selectTopic(t) {
  selectedTopic = t;
  document.querySelectorAll(".topic-card").forEach(c => c.classList.toggle("selected", +c.dataset.id === t.id));
  $("prompt-text").textContent = `"${t.prompt}"`;
  $("prompt-preview").style.display = "block";
  const btn = $("start-btn");
  btn.classList.add("ready");
  btn.textContent = "Start Practice →";
}

// ── Level buttons ─────────────────────────────────────
document.querySelectorAll(".level-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedLevel = btn.dataset.level;
  });
});

// ── Start button ──────────────────────────────────────
$("start-btn").addEventListener("click", () => {
  if (!selectedTopic) return;
  // populate practice banner
  $("banner-emoji").textContent = selectedTopic.emoji;
  $("banner-prompt").textContent = selectedTopic.prompt;
  // reset transcript
  finalTranscript = "";
  interimSnapshot = "";
  $("final-text").textContent = "";
  $("interim-text").textContent = "";
  $("transcript-placeholder").style.display = "inline";
  $("feedback-btn").style.display = "none";
  showScreen("practice");
});

// ── Back buttons ──────────────────────────────────────
$("practice-back").addEventListener("click", () => { stopRecording(); showScreen("home"); });
$("feedback-back").addEventListener("click", () => {
  $("feedback-body").innerHTML = "";
  // reset transcript for another try
  finalTranscript = "";
  interimSnapshot = "";
  $("final-text").textContent = "";
  $("interim-text").textContent = "";
  $("transcript-placeholder").style.display = "inline";
  $("feedback-btn").style.display = "none";
  showScreen("practice");
});

// ── Recording ─────────────────────────────────────────
$("mic-btn").addEventListener("click", () => isRecording ? stopRecording() : startRecording());

function startRecording() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Your browser doesn't support speech recognition. Please try Chrome."); return; }

  finalTranscript = "";
  interimSnapshot = "";
  recordingTime = 0;
  $("final-text").textContent = "";
  $("interim-text").textContent = "";
  $("transcript-placeholder").style.display = "none";
  $("feedback-btn").style.display = "none";

  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = "en-US";

  recognition.onresult = e => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const txt = e.results[i][0].transcript;
      if (e.results[i].isFinal) { finalTranscript += txt + " "; }
      else { interim += txt; }
    }
    interimSnapshot = interim;
    $("final-text").textContent = finalTranscript;
    $("interim-text").textContent = interim;
    $("transcript-placeholder").style.display = "none";
  };

  recognition.onerror = e => { if (e.error !== "aborted") console.error("Speech error:", e.error); };
  recognition.start();

  isRecording = true;
  $("mic-btn").classList.add("recording");
  $("mic-btn").textContent = "⏹";
  $("mic-area").classList.add("recording");
  $("rec-status").classList.add("active");

  timerInterval = setInterval(() => {
    recordingTime++;
    $("rec-status").textContent = `● REC ${fmt(recordingTime)}`;
  }, 1000);
}

function stopRecording() {
  if (recognition) { recognition.stop(); recognition = null; }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  isRecording = false;
  $("mic-btn").classList.remove("recording");
  $("mic-btn").textContent = "🎙";
  $("mic-area").classList.remove("recording");
  $("rec-status").classList.remove("active");
  $("rec-status").textContent = "Tap to start recording";

  const hasText = (finalTranscript + interimSnapshot).trim().length > 0;
  $("feedback-btn").style.display = hasText ? "inline-block" : "none";
}

// ── Get Feedback ──────────────────────────────────────
$("feedback-btn").addEventListener("click", getFeedback);

async function getFeedback() {
  const fullText = (finalTranscript + " " + interimSnapshot).trim();
  if (!fullText || fullText.length < 10) { alert("Please record at least a few sentences first!"); return; }

  showScreen("feedback");
  $("feedback-body").innerHTML = `
    <div class="loading-box">
      <div class="loading-icon">🤔</div>
      <p>Analyzing your speech...</p>
    </div>`;

  const systemPrompt = `你是一位親切、有耐心的英文口說教練，專門幫助台灣學生改善英文口說能力。請用繁體中文提供所有回饋說明，並附上具體的英文範例句子。

請只回傳 JSON 格式，不要有任何 markdown、說明文字或前言。

回傳以下 JSON 結構：
{
  "overallScore": <1-10的數字>,
  "encouragement": "<用繁體中文給一句具體、溫暖的鼓勵>",
  "fluency": { "score": <1-10>, "comment": "<用繁體中文說明流暢度表現>" },
  "vocabulary": {
    "score": <1-10>,
    "comment": "<用繁體中文說明用字遣詞的問題或優點>",
    "betterExpressions": [
      { "original": "<學生說的英文片語>", "better": "<更自然的英文說法>", "reason": "<用繁體中文解釋>" }
    ]
  },
  "grammar": {
    "score": <1-10>,
    "comment": "<用繁體中文說明文法問題>",
    "corrections": [
      { "wrong": "<學生說的錯誤句子>", "correct": "<正確英文句子>", "explanation": "<用繁體中文解釋錯在哪>" }
    ]
  },
  "content": { "score": <1-10>, "comment": "<用繁體中文說明內容是否切題、豐富>" },
  "betterVersion": "<用繁體中文介紹：如果要讓這段話說得更完整自然，可以這樣說 —— 然後給一段示範英文（2-4句）>",
  "tipOfTheDay": "<用繁體中文給一個具體可執行的口說練習小撇步>"
}`;

  try {
    const res = await fetch("https://test.kaguya890825.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{
          role: "user",
          content: `學生程度：${selectedLevel}\n練習題目：「${selectedTopic.prompt}」\n學生的回答：「${fullText}」\n\n請分析這段英文口說並以繁體中文回饋，回傳 JSON。`
        }]
      })
    });
    const data = await res.json();
    const raw = (data.content || []).map(b => b.text || "").join("");
    const clean = raw.replace(/```json|```/g, "").trim();
    const fb = JSON.parse(clean);
    renderFeedback(fb);
  } catch(err) {
    $("feedback-body").innerHTML = `<p class="error-msg">Could not load feedback. Please try again.</p>`;
  }
}

// ── Render Feedback ───────────────────────────────────
function renderFeedback(fb) {
  const categories = [
    { key:"fluency",    label:"🗣 流暢度",   color:"#4cc9f0" },
    { key:"vocabulary", label:"📚 用字遣詞", color:"#7b5ea7" },
    { key:"grammar",    label:"✏️ 文法",     color:"#f7c948" },
    { key:"content",    label:"💬 內容表達", color:"#56cfad" },
  ];

  let html = `
  <div class="feedback-content">
    <div class="score-hero">
      <div class="score-number grad-text playfair">${fb.overallScore}<span>/10</span></div>
      <p>${esc(fb.encouragement)}</p>
    </div>`;

  categories.forEach(({ key, label, color }) => {
    const d = fb[key];
    if (!d) return;
    html += `
    <div class="cat-card">
      <div class="cat-header">
        <span class="cat-name">${label}</span>
        <span class="cat-score" style="color:${color}">${d.score}/10</span>
      </div>
      <div class="score-bar-bg">
        <div class="score-bar-fill" style="width:${d.score*10}%;background:${color}"></div>
      </div>
      <p class="cat-comment">${esc(d.comment)}</p>`;

    if (d.betterExpressions?.length) {
      html += `<div class="sub-label" style="color:#7b5ea7">更自然的說法</div>`;
      d.betterExpressions.forEach(e => {
        html += `
        <div class="chip chip-vocab">
          <div class="chip-row">
            <span class="chip-wrong">${esc(e.original)}</span>
            <span class="chip-arrow">→</span>
            <span class="chip-right">${esc(e.better)}</span>
          </div>
          <div class="chip-reason">💡 ${esc(e.reason)}</div>
        </div>`;
      });
    }

    if (d.corrections?.length) {
      html += `<div class="sub-label" style="color:#f7c948">文法修正</div>`;
      d.corrections.forEach(c => {
        html += `
        <div class="chip chip-grammar">
          <div class="chip-row">
            <span class="chip-wrong">${esc(c.wrong)}</span>
            <span class="chip-arrow">→</span>
            <span class="chip-right">${esc(c.correct)}</span>
          </div>
          <div class="chip-reason">📝 ${esc(c.explanation)}</div>
        </div>`;
      });
    }

    html += `</div>`;
  });

  if (fb.betterVersion) {
    html += `
    <div class="better-version">
      <div class="sub-label" style="color:#56cfad;margin-top:0">✨ 示範：這樣說更棒！</div>
      <p>${esc(fb.betterVersion)}</p>
    </div>`;
  }

  if (fb.tipOfTheDay) {
    html += `
    <div class="tip-box">
      <div class="sub-label" style="color:#f7c948;margin-top:0">今日練習小撇步</div>
      <p>🌱 ${esc(fb.tipOfTheDay)}</p>
    </div>`;
  }

  html += `<button class="again-btn" id="again-btn">Practice Again 🎙</button></div>`;
  $("feedback-body").innerHTML = html;

  $("again-btn").addEventListener("click", () => {
    $("feedback-body").innerHTML = "";
    finalTranscript = "";
    interimSnapshot = "";
    $("final-text").textContent = "";
    $("interim-text").textContent = "";
    $("transcript-placeholder").style.display = "inline";
    $("feedback-btn").style.display = "none";
    showScreen("practice");
  });
}

// ── Escape HTML ───────────────────────────────────────
function esc(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/\n/g,"<br>");
}
</script>
