<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    --paper:#F6F7F3;
    --paper-raised:#FFFFFF;
    --ink:#1E2723;
    --ink-soft:#5C685F;
    --line:#D9DED3;
    --line-strong:#B9C2B4;
    --teal:#2A6F6F;
    --teal-deep:#1D4F4F;
    --match:#2F7A4E;
    --match-bg:#E7F3EA;
    --nomatch:#B5533C;
    --nomatch-bg:#FBEAE5;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  .wrap{
    font-family:var(--sans);
    color:var(--ink);
    background:
      linear-gradient(var(--line) 1px, transparent 1px) 0 0/100% 28px,
      var(--paper);
    background-attachment:local;
    padding:32px 20px 60px;
    min-height:100%;
  }
  .container{max-width:900px;margin:0 auto;}

  .header{margin-bottom:28px;}
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.14em;
    color:var(--teal-deep);
    text-transform:uppercase;
    display:flex;align-items:center;gap:8px;
  }
  .eyebrow::before{content:'';width:16px;height:1px;background:var(--teal-deep);display:inline-block;}
  h1{
    font-size:28px;
    line-height:1.25;
    margin:8px 0 6px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .sub{color:var(--ink-soft);font-size:14px;line-height:1.6;max-width:560px;}

  .card{
    background:var(--paper-raised);
    border:1px solid var(--line-strong);
    border-radius:3px;
    padding:22px 22px 24px;
    margin-bottom:16px;
    position:relative;
  }
  .card.disabled{opacity:0.45;pointer-events:none;}
  .step-label{
    font-family:var(--mono);
    font-size:11px;
    color:var(--teal-deep);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:4px;
    display:block;
  }
  .card h2{font-size:16px;margin:0 0 14px;font-weight:600;}

  .drop-row{display:flex;gap:14px;flex-wrap:wrap;}
  .dropzone{
    flex:1 1 260px;
    border:1.5px dashed var(--line-strong);
    border-radius:3px;
    padding:18px 16px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s;
    background:var(--paper);
  }
  .dropzone:hover, .dropzone.drag{border-color:var(--teal); background:#EEF5F3;}
  .dropzone input{display:none;}
  .dz-icon{font-family:var(--mono);font-size:12px;color:var(--ink-soft);letter-spacing:.06em;}
  .dz-title{font-weight:600;font-size:14px;margin:6px 0 4px;}
  .dz-hint{font-size:12px;color:var(--ink-soft);}
  .dz-file{
    margin-top:10px;
    font-family:var(--mono);
    font-size:12px;
    background:var(--match-bg);
    color:var(--match);
    border-radius:3px;
    padding:6px 8px;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .dz-file .rows{color:var(--ink-soft);}
  .dz-error{
    margin-top:10px;
    font-family:var(--mono);
    font-size:12px;
    background:var(--nomatch-bg);
    color:var(--nomatch);
    border-radius:3px;
    padding:6px 8px;
  }

  label.field-label{
    font-size:12px;
    color:var(--ink-soft);
    display:block;
    margin-bottom:5px;
    font-weight:500;
  }
  select, input[type=text]{
    font-family:var(--sans);
    font-size:13px;
    padding:8px 10px;
    border:1px solid var(--line-strong);
    border-radius:3px;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  select:focus, input:focus{outline:2px solid var(--teal); outline-offset:1px;}

  .key-row{display:flex;gap:12px;align-items:end;margin-bottom:10px;flex-wrap:wrap;}
  .key-row .col{flex:1 1 220px;}
  .key-row .arrow{
    font-family:var(--mono);color:var(--teal);font-size:16px;
    padding-bottom:9px;
  }
  .key-row .remove{
    font-family:var(--mono);font-size:11px;color:var(--nomatch);
    background:none;border:1px solid var(--nomatch);border-radius:3px;
    padding:8px 10px;cursor:pointer;height:36px;
  }
  .add-key{
    font-family:var(--mono);font-size:12px;color:var(--teal-deep);
    background:none;border:1px dashed var(--line-strong);border-radius:3px;
    padding:7px 12px;cursor:pointer;margin-top:2px;
  }
  .add-key:hover{border-color:var(--teal);}

  .opt-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px 18px;
    margin-top:16px;
    padding-top:16px;
    border-top:1px solid var(--line);
  }
  .opt{display:flex;align-items:flex-start;gap:8px;}
  .opt input{width:auto;margin-top:2px;}
  .opt .opt-text{font-size:13px;}
  .opt .opt-text .d{display:block;font-size:11px;color:var(--ink-soft);margin-top:1px;}

  .radio-row{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
  .radio-opt{display:flex;align-items:flex-start;gap:8px;font-size:13px;flex:1 1 240px;}
  .radio-opt input{margin-top:3px;}
  .radio-opt .d{display:block;font-size:11px;color:var(--ink-soft);margin-top:1px;}

  .btn{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:.02em;
    background:var(--teal-deep);
    color:#fff;
    border:none;
    border-radius:3px;
    padding:11px 20px;
    cursor:pointer;
    transition:background .15s;
  }
  .btn:hover{background:var(--teal);}
  .btn:disabled{background:#B9C2B4;cursor:not-allowed;}
  .btn.secondary{
    background:none;color:var(--teal-deep);border:1px solid var(--teal-deep);
  }
  .btn.secondary:hover{background:#EEF5F3;}

  .run-row{display:flex;align-items:center;gap:14px;margin-top:18px;}
  .run-note{font-size:12px;color:var(--ink-soft);}

  .stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
  .stat{
    flex:1 1 150px;
    border:1px solid var(--line-strong);
    border-radius:3px;
    padding:14px 16px;
    background:var(--paper-raised);
  }
  .stat .num{font-family:var(--mono);font-size:24px;font-weight:600;}
  .stat .lbl{font-size:11px;color:var(--ink-soft);margin-top:2px;letter-spacing:.03em;}
  .stat.match .num{color:var(--match);}
  .stat.nomatch .num{color:var(--nomatch);}

  .result-block{margin-bottom:22px;}
  .result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
  .result-title{
    font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;
  }
  .badge{
    font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:20px;
  }
  .badge.match{background:var(--match-bg);color:var(--match);}
  .badge.nomatch{background:var(--nomatch-bg);color:var(--nomatch);}
  .dl-buttons{display:flex;gap:8px;}
  .dl-btn{
    font-family:var(--mono);font-size:11px;
    border:1px solid var(--line-strong);background:#fff;
    padding:7px 12px;border-radius:3px;cursor:pointer;color:var(--ink);
  }
  .dl-btn:hover{border-color:var(--teal);color:var(--teal-deep);}

  .table-scroll{
    border:1px solid var(--line-strong);
    border-radius:3px;
    overflow:auto;
    max-height:280px;
  }
  table{border-collapse:collapse;width:100%;font-size:12px;font-family:var(--mono);}
  th,td{
    padding:7px 10px;text-align:left;white-space:nowrap;
    border-bottom:1px solid var(--line);
  }
  th{
    background:var(--paper);position:sticky;top:0;
    color:var(--ink-soft);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.04em;
  }
  tr:last-child td{border-bottom:none;}
  .preview-note{font-size:11px;color:var(--ink-soft);margin-top:6px;font-family:var(--mono);}

  .error-banner{
    background:var(--nomatch-bg);color:var(--nomatch);
    border:1px solid var(--nomatch);border-radius:3px;
    padding:10px 14px;font-size:13px;margin-bottom:14px;
  }

  .reset-row{text-align:right;margin-top:6px;}
  .reset-row button{
    font-family:var(--mono);font-size:11px;color:var(--ink-soft);
    background:none;border:none;cursor:pointer;text-decoration:underline;
  }

  @media (max-width:520px){
    h1{font-size:22px;}
    .card{padding:16px;}
    .stat{flex:1 1 100%;}
  }
</style>

<div class="wrap">
  <div class="container">
    <div class="header">
      <span class="eyebrow">Match &amp; Split</span>
      <h1>名單比對工具</h1>
      <p class="sub">上傳受眾名單與訂單明細，選擇要比對的欄位，自動輸出「有比對到」與「沒比對到」兩份名單。整個過程都在你的瀏覽器裡完成，檔案不會被上傳到任何伺服器。</p>
    </div>

    <!-- STEP 1: upload -->
    <div class="card" id="step1">
      <span class="step-label">Step 01</span>
      <h2>上傳兩份檔案</h2>
      <div class="drop-row">
        <div class="dropzone" id="dz-audience">
          <input type="file" id="file-audience" accept=".xlsx,.xls,.csv">
          <div class="dz-icon">[ .xlsx / .csv ]</div>
          <div class="dz-title">受眾名單</div>
          <div class="dz-hint">點擊或拖曳檔案到這裡</div>
          <div id="audience-status"></div>
        </div>
        <div class="dropzone" id="dz-order">
          <input type="file" id="file-order" accept=".xlsx,.xls,.csv">
          <div class="dz-icon">[ .xlsx / .csv ]</div>
          <div class="dz-title">訂單明細</div>
          <div class="dz-hint">點擊或拖曳檔案到這裡</div>
          <div id="order-status"></div>
        </div>
      </div>
    </div>

    <!-- STEP 2: configure -->
    <div class="card disabled" id="step2">
      <span class="step-label">Step 02</span>
      <h2>設定比對欄位</h2>
      <div id="key-rows"></div>
      <button class="add-key" id="add-key-btn" type="button">+ 新增比對欄位（例如同時比對姓名＋手機）</button>

      <div class="opt-grid">
        <label class="opt">
          <input type="checkbox" id="opt-trim" checked>
          <span class="opt-text">去除頭尾空白<span class="d">避免因多餘空格造成比對失敗</span></span>
        </label>
        <label class="opt">
          <input type="checkbox" id="opt-case" checked>
          <span class="opt-text">忽略英文大小寫<span class="d">Email 常見大小寫不一致</span></span>
        </label>
        <label class="opt">
          <input type="checkbox" id="opt-digits">
          <span class="opt-text">只比對數字<span class="d">適合手機號碼（自動去除 - 空格等符號）</span></span>
        </label>
      </div>

      <div class="radio-row">
        <label class="radio-opt">
          <input type="radio" name="mode" value="merge_first" checked>
          <span>比對到多筆訂單時，只合併第一筆<span class="d">受眾名單維持一人一列，另加「比對筆數」欄位</span></span>
        </label>
        <label class="radio-opt">
          <input type="radio" name="mode" value="expand_all">
          <span>比對到多筆訂單時，全部展開<span class="d">同一人有幾筆訂單就輸出幾列</span></span>
        </label>
      </div>

      <div class="run-row">
        <button class="btn" id="run-btn" disabled>開始比對</button>
        <span class="run-note" id="run-note"></span>
      </div>
    </div>

    <!-- STEP 3: results -->
    <div id="results-wrap"></div>

    <div class="reset-row" id="reset-row" style="display:none;">
      <button id="reset-btn">重新開始 / 清除所有資料</button>
    </div>
  </div>
</div>

<script>
(function(){
  const state = {
    audience: null, // {name, headers, rows}
    order: null,
    keyPairs: [], // [{a, o}]
  };

  // ---------- file parsing ----------
  function parseFile(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try{
          const data = new Uint8Array(e.target.result);
          const wb = XLSX.read(data, {type:'array'});
          const firstSheet = wb.SheetNames[0];
          const ws = wb.Sheets[firstSheet];
          const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
          if(!rows.length){
            reject('檔案是空的，或找不到資料列。');
            return;
          }
          const headers = Object.keys(rows[0]);
          resolve({name: file.name, headers, rows});
        }catch(err){
          reject('無法讀取這個檔案，請確認格式是 .xlsx / .xls / .csv。');
        }
      };
      reader.onerror = () => reject('讀取檔案時發生錯誤。');
      reader.readAsArrayBuffer(file);
    });
  }

  function setupDropzone(dzId, inputId, statusId, onFile){
    const dz = document.getElementById(dzId);
    const input = document.getElementById(inputId);
    const status = document.getElementById(statusId);

    dz.addEventListener('click', () => input.click());
    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('drag'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
    dz.addEventListener('drop', (e) => {
      e.preventDefault(); dz.classList.remove('drag');
      if(e.dataTransfer.files[0]) handle(e.dataTransfer.files[0]);
    });
    input.addEventListener('change', () => {
      if(input.files[0]) handle(input.files[0]);
    });

    function handle(file){
      status.innerHTML = '<div class="dz-hint">讀取中…</div>';
      parseFile(file).then(result => {
        status.innerHTML = `<div class="dz-file">✓ ${escapeHtml(result.name)} <span class="rows">· ${result.rows.length.toLocaleString()} 列</span></div>`;
        onFile(result);
      }).catch(errMsg => {
        status.innerHTML = `<div class="dz-error">${escapeHtml(errMsg)}</div>`;
      });
    }
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  setupDropzone('dz-audience','file-audience','audience-status', (result) => {
    state.audience = result;
    afterFileLoaded();
  });
  setupDropzone('dz-order','file-order','order-status', (result) => {
    state.order = result;
    afterFileLoaded();
  });

  function afterFileLoaded(){
    if(state.audience && state.order){
      document.getElementById('step2').classList.remove('disabled');
      if(state.keyPairs.length === 0){
        addKeyRow();
      }
      document.getElementById('run-btn').disabled = false;
    }
  }

  // ---------- key column rows ----------
  const keyRowsEl = document.getElementById('key-rows');

  function addKeyRow(){
    const idx = state.keyPairs.length;
    const pair = {a: guessDefault(state.audience.headers, idx), o: guessDefault(state.order.headers, idx)};
    state.keyPairs.push(pair);
    renderKeyRows();
  }

  function guessDefault(headers, idx){
    if(headers[idx]) return headers[idx];
    return headers[0];
  }

  function renderKeyRows(){
    keyRowsEl.innerHTML = '';
    state.keyPairs.forEach((pair, i) => {
      const row = document.createElement('div');
      row.className = 'key-row';
      row.innerHTML = `
        <div class="col">
          <label class="field-label">受眾名單欄位 ${i===0?'':'#'+(i+1)}</label>
          <select data-i="${i}" data-side="a"></select>
        </div>
        <div class="arrow">=</div>
        <div class="col">
          <label class="field-label">訂單明細欄位 ${i===0?'':'#'+(i+1)}</label>
          <select data-i="${i}" data-side="o"></select>
        </div>
        ${state.keyPairs.length > 1 ? `<button class="remove" data-remove="${i}" type="button">移除</button>` : ''}
      `;
      keyRowsEl.appendChild(row);

      const selA = row.querySelector('select[data-side="a"]');
      const selO = row.querySelector('select[data-side="o"]');
      fillSelect(selA, state.audience.headers, pair.a);
      fillSelect(selO, state.order.headers, pair.o);
      selA.addEventListener('change', () => { pair.a = selA.value; });
      selO.addEventListener('change', () => { pair.o = selO.value; });
    });

    keyRowsEl.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = parseInt(btn.getAttribute('data-remove'), 10);
        state.keyPairs.splice(i, 1);
        renderKeyRows();
      });
    });
  }

  function fillSelect(sel, headers, selected){
    sel.innerHTML = headers.map(h => `<option value="${escapeHtml(h)}" ${h===selected?'selected':''}>${escapeHtml(h)}</option>`).join('');
  }

  document.getElementById('add-key-btn').addEventListener('click', () => {
    if(state.keyPairs.length >= 4){ return; }
    addKeyRow();
  });

  // ---------- matching ----------
  function normalize(value, opts){
    let s = (value === null || value === undefined) ? '' : String(value);
    if(opts.trim) s = s.trim();
    if(opts.digits) s = s.replace(/\D/g, '');
    if(opts.caseInsensitive) s = s.toLowerCase();
    return s;
  }

  function buildKey(row, cols, opts){
    return cols.map(c => normalize(row[c], opts)).join('\u0001');
  }

  document.getElementById('run-btn').addEventListener('click', runMatch);

  function runMatch(){
    const resultsWrap = document.getElementById('results-wrap');
    resultsWrap.innerHTML = '';

    if(!state.audience || !state.order){ return; }

    const opts = {
      trim: document.getElementById('opt-trim').checked,
      caseInsensitive: document.getElementById('opt-case').checked,
      digits: document.getElementById('opt-digits').checked,
    };
    const mode = document.querySelector('input[name=mode]:checked').value;

    const aCols = state.keyPairs.map(p => p.a);
    const oCols = state.keyPairs.map(p => p.o);

    if(aCols.some(c=>!c) || oCols.some(c=>!c)){
      resultsWrap.innerHTML = '<div class="error-banner">請確認每一列比對欄位都已選擇。</div>';
      return;
    }

    // build lookup map from order data
    const orderMap = new Map();
    for(const row of state.order.rows){
      const key = buildKey(row, oCols, opts);
      if(key === '') continue;
      if(!orderMap.has(key)) orderMap.set(key, []);
      orderMap.get(key).push(row);
    }

    const matchedRows = [];
    const unmatchedRows = [];
    const orderHeaderPrefixed = state.order.headers.map(h => '訂單_' + h);

    for(const aRow of state.audience.rows){
      const key = buildKey(aRow, aCols, opts);
      const hits = key !== '' ? orderMap.get(key) : undefined;

      if(hits && hits.length){
        if(mode === 'merge_first'){
          const merged = {...aRow};
          state.order.headers.forEach(h => { merged['訂單_' + h] = hits[0][h]; });
          merged['比對筆數'] = hits.length;
          matchedRows.push(merged);
        } else {
          hits.forEach(hit => {
            const merged = {...aRow};
            state.order.headers.forEach(h => { merged['訂單_' + h] = hit[h]; });
            matchedRows.push(merged);
          });
        }
      } else {
        unmatchedRows.push({...aRow});
      }
    }

    renderResults(matchedRows, unmatchedRows);
    document.getElementById('reset-row').style.display = 'block';
  }

  function renderResults(matchedRows, unmatchedRows){
    const wrap = document.getElementById('results-wrap');

    const totalAudience = state.audience.rows.length;
    const matchedAudienceCount = new Set(); // approximate: count unique original rows matched (for expand mode this may overcount, so just show row counts honestly)

    const statsHtml = `
      <div class="card">
        <span class="step-label">Step 03</span>
        <h2>比對結果</h2>
        <div class="stats">
          <div class="stat">
            <div class="num">${totalAudience.toLocaleString()}</div>
            <div class="lbl">受眾名單總數</div>
          </div>
          <div class="stat match">
            <div class="num">${matchedRows.length.toLocaleString()}</div>
            <div class="lbl">有比對到（輸出列數）</div>
          </div>
          <div class="stat nomatch">
            <div class="num">${unmatchedRows.length.toLocaleString()}</div>
            <div class="lbl">沒比對到</div>
          </div>
        </div>
        ${renderResultBlock('有比對到', matchedRows, 'match')}
        ${renderResultBlock('沒比對到', unmatchedRows, 'nomatch')}
      </div>
    `;
    wrap.innerHTML = statsHtml;

    wrap.querySelector('[data-dl="match-xlsx"]').addEventListener('click', () => downloadRows(matchedRows, '有比對到', 'xlsx'));
    wrap.querySelector('[data-dl="match-csv"]').addEventListener('click', () => downloadRows(matchedRows, '有比對到', 'csv'));
    wrap.querySelector('[data-dl="nomatch-xlsx"]').addEventListener('click', () => downloadRows(unmatchedRows, '沒比對到', 'xlsx'));
    wrap.querySelector('[data-dl="nomatch-csv"]').addEventListener('click', () => downloadRows(unmatchedRows, '沒比對到', 'csv'));
  }

  function renderResultBlock(title, rows, kind){
    const key = kind === 'match' ? 'match' : 'nomatch';
    const headers = rows.length ? Object.keys(rows[0]) : [];
    const previewRows = rows.slice(0, 15);
    return `
      <div class="result-block">
        <div class="result-head">
          <div class="result-title">${title} <span class="badge ${key}">${rows.length.toLocaleString()} 筆</span></div>
          <div class="dl-buttons">
            <button class="dl-btn" data-dl="${key==='match'?'match':'nomatch'}-xlsx">下載 .xlsx</button>
            <button class="dl-btn" data-dl="${key==='match'?'match':'nomatch'}-csv">下載 .csv</button>
          </div>
        </div>
        ${rows.length ? `
        <div class="table-scroll">
          <table>
            <thead><tr>${headers.map(h=>`<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>
            <tbody>
              ${previewRows.map(r => `<tr>${headers.map(h=>`<td>${escapeHtml(r[h])}</td>`).join('')}</tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div class="preview-note">預覽前 ${previewRows.length} 筆，完整資料請下載檔案</div>
        ` : `<div class="preview-note">（無資料）</div>`}
      </div>
    `;
  }

  function downloadRows(rows, baseName, type){
    if(!rows.length){
      alert('這份名單沒有資料可以下載。');
      return;
    }
    const ws = XLSX.utils.json_to_sheet(rows);
    if(type === 'xlsx'){
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, baseName.slice(0,28));
      const out = XLSX.write(wb, {bookType:'xlsx', type:'array'});
      triggerDownload(new Blob([out], {type:'application/octet-stream'}), `${baseName}.xlsx`);
    } else {
      const csv = XLSX.utils.sheet_to_csv(ws);
      const csvWithBom = '\uFEFF' + csv;
      triggerDownload(new Blob([csvWithBom], {type:'text/csv;charset=utf-8;'}), `${baseName}.csv`);
    }
  }

  function triggerDownload(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  document.getElementById('reset-btn').addEventListener('click', () => {
    location.reload();
  });

})();
</script>
